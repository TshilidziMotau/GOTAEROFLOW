version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gota
      POSTGRES_USER: gota
      POSTGRES_PASSWORD: gota
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://gota:gota@db:5432/gota
      UPLOAD_DIR: /app/uploads
      PROCESSED_DIR: /app/processed
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/processed:/app/processed
    ports:
      - '8000:8000'
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
